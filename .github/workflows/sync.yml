name: Sync CV Content and Assets

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.md'
      - '**/images/**'
      - '.github/workflows/sync.yml' # 修正：改 YAML 也要觸發同步

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sub Repo
        uses: actions/checkout@v4
        with:
          path: sub-repo

      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          repository: Deep-Learning-101/deep-learning-101.github.io
          token: ${{ secrets.GH_PAT }}
          path: main-repo
          fetch-depth: 0

      - name: Sync and Mirror Structure
        run: |
          # 1. 處理 CV 核心檔案
          cp sub-repo/README.md main-repo/Computer-Vision.md
          
          # 2. 全資源鏡像
          cd sub-repo
          # 這裡我們用更保險的方式排除
          find . -maxdepth 1 -type d ! -name "." ! -name ".github" ! -name ".git" | while read dir; do
            mkdir -p "../main-repo/$dir"
            cp -a "$dir/." "../main-repo/$dir/"
          done

      - name: Commit and Push
        run: |
          cd main-repo
          
          # 擷取資訊，加入備援機制防止抓不到作者
          ORIGINAL_MSG="${{ github.event.head_commit.message }}"
          AUTHOR_NAME="${{ github.event.head_commit.author.name }}"
          AUTHOR_EMAIL="${{ github.event.head_commit.author.email }}"
          
          # 如果抓不到作者資訊（例如網頁端小改），就用預設機器人
          git config user.name "${AUTHOR_NAME:-github-actions[bot]}"
          git config user.email "${AUTHOR_EMAIL:-github-actions[bot]@users.noreply.github.com}"

          git add .

          if ! git diff --quiet || ! git diff --staged --quiet; then
            # 修正：這裡改成 CV Sync，方便主站辨識來源
            git commit -m "CV Sync: $ORIGINAL_MSG (From Sub: ${GITHUB_SHA:0:7})"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected between Sub and Main. Skipping."
          fi