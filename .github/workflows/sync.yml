name: Sync Computer-Vision

on:
  push:
    branches: [ main ]
    paths:
      - 'README.md'
      - '_includes/ai-share.html' # 監控 HTML 變動
      - '**/images/**'
      - '.github/workflows/sync.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sub Repo
        uses: actions/checkout@v4
        with:
          path: sub-repo
          fetch-depth: 0 # 必須設定 0 以偵測檔案變動

      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          repository: Deep-Learning-101/deep-learning-101.github.io
          token: ${{ secrets.GH_PAT }}
          path: main-repo
          fetch-depth: 0

      # 步驟 1：偵測哪些路徑發生了變動
      - name: Check which files changed
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            readme:
              - 'README.md'
            includes:
              - '_includes/ai-share.html'
            images:
              - '**/images/**'

      # 步驟 2：根據偵測結果進行選擇性同步
      - name: Selective Sync
        run: |
          # 只有 README.md 更新時，才同步並重新命名為 Computer-Vision.md
          if [ "${{ steps.filter.outputs.readme }}" == 'true' ]; then
            echo "Syncing README for CV..."
            cp sub-repo/README.md main-repo/Computer-Vision.md
          fi

          # 只有 ai-share.html 更新時，才同步 _includes 資料夾
          if [ "${{ steps.filter.outputs.includes }}" == 'true' ]; then
            echo "Syncing _includes (ai-share.html)..."
            mkdir -p main-repo/_includes
            cp sub-repo/_includes/ai-share.html main-repo/_includes/ai-share.html
          fi

          # 只有圖片資料夾有變動時，才同步 images
          if [ "${{ steps.filter.outputs.images }}" == 'true' ]; then
            echo "Syncing images..."
            mkdir -p main-repo/images
            cp -a sub-repo/images/. main-repo/images/
          fi

      - name: Commit and Push
        run: |
          cd main-repo
          ORIGINAL_MSG="${{ github.event.head_commit.message }}"
          AUTHOR_NAME="${{ github.event.head_commit.author.name }}"
          AUTHOR_EMAIL="${{ github.event.head_commit.author.email }}"
          SUB_SHA="${{ github.sha }}"

          git config user.name "${AUTHOR_NAME:-github-actions[bot]}"
          git config user.email "${AUTHOR_EMAIL:-github-actions[bot]@users.noreply.github.com}"

          git add .

          if ! git diff --quiet || ! git diff --staged --quiet; then
            # 保持 CV Sync 標籤以資識別[cite: 1]
            git commit -m "CV Selective Sync: $ORIGINAL_MSG (From Sub: ${SUB_SHA:0:7})"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected, skipping sync."
          fi
