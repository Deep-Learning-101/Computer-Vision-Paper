name: Sync CV Content and Assets

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.md'
      - '**/images/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sub Repo
        uses: actions/checkout@v4
        with:
          path: sub-repo

      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          repository: Deep-Learning-101/deep-learning-101.github.io
          token: ${{ secrets.GH_PAT }}
          path: main-repo
          fetch-depth: 0 # 確保抓取完整歷史

      - name: Sync and Mirror Structure
        run: |
          # 1. 處理 CV 核心檔案
          cp sub-repo/README.md main-repo/Computer-Vision.md
          
          # 2. 全資源鏡像
          cd sub-repo
          find . -maxdepth 1 -type d | while read dir; do
            if [ "$dir" != "." ] && [ "$dir" != "./.github" ] && [ "$dir" != "./.git" ]; then
              mkdir -p "../main-repo/$dir"
              cp -a "$dir/." "../main-repo/$dir/"
            fi
          done

      - name: Commit and Push
        run: |
          cd main-repo

          # 1. 抓取子站原始資訊：訊息、作者、Email、SHA
          ORIGINAL_MSG="${{ github.event.head_commit.message }}"
          AUTHOR_NAME="${{ github.event.head_commit.author.name }}"
          AUTHOR_EMAIL="${{ github.event.head_commit.author.email }}"
          SUB_SHA="${{ github.sha }}"

          # 2. 設定 Git 作者（讓主站綠色格子算在你的帳號下）
          git config user.name "$AUTHOR_NAME"
          git config user.email "$AUTHOR_EMAIL"

          # 3. 暫存搬移過來的內容
          git add .

          # 4. 檢查是否有變動
          if ! git diff --quiet || ! git diff --staged --quiet; then
            # 建立包含子站訊息與 SHA 的 Commit
            git commit -m "NLP Sync: $ORIGINAL_MSG (From Sub: ${SUB_SHA:0:7})"

            # 5. 關鍵補救：防止主站有變動導致 rejected
            git pull --rebase origin main

            # 6. 推送
            git push origin main
          else
            echo "No changes detected, skipping sync."
          fi